<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Evento — un detalle que conecta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root{--gold:#E9C46A;--gold2:#F4D58D;--pink:#FF6B9D;--ink:#0E1230;--ink2:#231654;--text:#EAE6F5;--muted:#A9A3C9;--green:#27D17C;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--ink);overflow-x:hidden;line-height:1.5;}
  .bgwrap{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0E1230,#231654,#0E1230);background-size:200% 200%;animation:grad 16s ease infinite;}
  @keyframes grad{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
  .spark{position:fixed;border-radius:50%;background:var(--gold);opacity:.0;z-index:0;animation:tw 4s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:0;transform:translateY(0)}50%{opacity:.5;transform:translateY(-8px)}}
  .wrap{position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:0 20px;}
  .lang{display:flex;gap:6px;justify-content:flex-end;padding:14px 0 0;}
  .lbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);color:var(--muted);font-family:inherit;font-weight:600;font-size:.78rem;border-radius:999px;padding:5px 11px;cursor:pointer;transition:.15s;}
  .lbtn.on{border-color:var(--gold);color:var(--gold);}

  .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center;padding:34px 0 30px;}
  .proof{display:inline-flex;align-items:center;gap:8px;background:rgba(233,196,106,.12);border:1px solid rgba(233,196,106,.32);color:var(--gold2);font-size:.78rem;font-weight:600;padding:6px 13px;border-radius:999px;margin-bottom:18px;}
  h1{font-family:'Playfair Display',serif;font-weight:800;font-size:2.7rem;line-height:1.08;color:#fff;margin-bottom:14px;}
  .sub{color:var(--muted);font-size:1.06rem;max-width:30em;margin-bottom:24px;}
  .cta{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{border:none;border-radius:14px;font-family:inherit;font-weight:700;font-size:1rem;padding:14px 22px;cursor:pointer;text-decoration:none;display:inline-block;transition:.18s;}
  .btn.gold{background:linear-gradient(90deg,var(--gold),var(--gold2));color:var(--ink2);box-shadow:0 10px 26px rgba(233,196,106,.36);}
  .btn.gold:hover{transform:translateY(-2px);}
  .btn.ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.2);color:#fff;}
  .heroimg{width:100%;height:340px;object-fit:cover;border-radius:22px;border:1px solid rgba(255,255,255,.14);box-shadow:0 26px 60px rgba(0,0,0,.5);}

  .stage{text-align:center;padding:20px 0 10px;}
  .stage h2{font-family:'Playfair Display',serif;font-size:1.7rem;color:#fff;margin-bottom:6px;}
  .stage .h2sub{color:var(--muted);margin-bottom:26px;}
  .demoarea{display:grid;grid-template-columns:300px 1fr;gap:34px;align-items:center;justify-items:center;max-width:760px;margin:0 auto;}
  /* móvil */
  .phone{width:286px;height:580px;border-radius:40px;background:#080a1a;padding:13px;position:relative;box-shadow:0 30px 70px rgba(0,0,0,.55);flex:0 0 auto;}
  .notch{position:absolute;top:15px;left:50%;transform:translateX(-50%);width:84px;height:7px;background:rgba(255,255,255,.18);border-radius:99px;z-index:6;}
  .pscreen{width:100%;height:100%;border-radius:28px;overflow:hidden;position:relative;background:linear-gradient(160deg,#0E1230,#231654);}
  .pbar{position:absolute;top:0;left:0;height:4px;background:var(--gold);width:0;z-index:5;}
  .frame{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;text-align:center;opacity:0;transform:scale(.96);transition:opacity .5s,transform .5s;pointer-events:none;}
  .frame.on{opacity:1;transform:scale(1);}
  .fic{font-size:2.4rem;margin-bottom:10px;}
  .ftitle{font-weight:800;color:#fff;font-size:1.15rem;margin-bottom:6px;}
  .ftxt{color:#cfc8ec;font-size:.84rem;}
  .qr{width:120px;height:120px;border-radius:16px;background:
     repeating-linear-gradient(90deg,#fff 0 8px,transparent 8px 16px),
     repeating-linear-gradient(0deg,#fff 0 8px,transparent 8px 16px);
     background-color:#231654;margin-bottom:14px;border:6px solid #fff;}
  .opt{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:11px;margin:6px 0;font-size:.82rem;text-align:left;color:#eee;}
  .opt.good{border-color:var(--green);background:rgba(39,209,124,.18);color:#fff;}
  .pola{width:150px;background:#fff;padding:8px 8px 26px;border-radius:6px;transform:rotate(-4deg);box-shadow:0 14px 30px rgba(0,0,0,.4);}
  .pola img{width:100%;height:140px;object-fit:cover;border-radius:3px;display:block;}
  .rk{width:100%;}
  .rkrow{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:.82rem;color:#fff;}
  .rkbar{height:14px;border-radius:7px;background:linear-gradient(90deg,var(--gold),var(--pink));}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
  .chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:6px 12px;font-size:.78rem;color:#fff;}
  /* caption a la derecha del móvil */
  .caption{max-width:300px;text-align:left;}
  .cstep{color:var(--gold);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .ctitle{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;margin-bottom:8px;}
  .ctext{color:var(--muted);font-size:1rem;}
  .dots{display:flex;gap:7px;margin-top:16px;}
  .dots i{width:8px;height:8px;border-radius:99px;background:rgba(255,255,255,.2);display:block;transition:.2s;cursor:pointer;}
  .dots i.on{background:var(--gold);width:22px;}

  .stats{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;padding:38px 0 6px;}
  .stat{text-align:center;}
  .stat .n{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--gold);font-weight:800;}
  .stat .l{color:var(--muted);font-size:.85rem;}

  .events{text-align:center;padding:30px 0 8px;}
  .events h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:14px;}

  .final{text-align:center;padding:44px 0 60px;}
  .final h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:#fff;margin-bottom:8px;max-width:18em;margin-left:auto;margin-right:auto;}
  .final p{color:var(--muted);margin-bottom:22px;}
  .credit{display:block;color:var(--muted);font-size:.8rem;margin-top:26px;text-decoration:none;}
  .credit b{color:var(--gold);}

  @media(max-width:760px){
    .hero{grid-template-columns:1fr;gap:22px;}
    h1{font-size:2.1rem;}
    .heroimg{height:230px;}
    .demoarea{grid-template-columns:1fr;gap:20px;}
    .caption{text-align:center;max-width:none;}
    .dots{justify-content:center;}
  }
</style>
</head>
<body>
<div class="bgwrap"></div>
<div class="wrap">

  <div class="lang">
    <button class="lbtn on" id="l-es" onclick="setLang('es')">🇪🇸 ES</button>
    <button class="lbtn" id="l-sv" onclick="setLang('sv')">🇸🇪 SV</button>
    <button class="lbtn" id="l-en" onclick="setLang('en')">🇬🇧 EN</button>
  </div>

  <section class="hero">
    <div>
      <span class="proof" id="proof"></span>
      <h1 id="h1"></h1>
      <p class="sub" id="sub"></p>
      <div class="cta">
        <a class="btn gold" id="cta1" href="#demo"></a>
        <a class="btn ghost" id="cta2" href="https://tualiada.es" target="_blank" rel="noopener"></a>
      </div>
    </div>
    <img class="heroimg" alt="" src="https://images.pexels.com/photos/6952747/pexels-photo-6952747.jpeg?auto=compress&cs=tinysrgb&w=900">
  </section>

  <section class="stage" id="demo">
    <h2 id="stTitle"></h2>
    <div class="h2sub" id="stSub"></div>
    <div class="demoarea">
      <div class="phone">
        <div class="notch"></div>
        <div class="pscreen">
          <div class="pbar" id="pbar"></div>
          <div class="frame" data-i="0"><div class="fic">📲</div><div class="qr"></div><div class="ftitle" id="f0t"></div></div>
          <div class="frame" data-i="1"><div class="fic">🎯</div><div class="ftitle" id="f1t" style="margin-bottom:12px"></div><div class="opt">A</div><div class="opt good">B ✓</div><div class="opt">C</div></div>
          <div class="frame" data-i="2"><div class="pola"><img alt="" src="https://images.pexels.com/photos/30682913/pexels-photo-30682913.jpeg?auto=compress&cs=tinysrgb&w=500"></div><div class="ftitle" id="f2t" style="margin-top:14px"></div></div>
          <div class="frame" data-i="3"><div class="ftitle" id="f3t" style="margin-bottom:12px"></div><div class="rk">
            <div class="rkrow">🥇 <div class="rkbar" style="width:78%"></div></div>
            <div class="rkrow">🥈 <div class="rkbar" style="width:60%"></div></div>
            <div class="rkrow">🥉 <div class="rkbar" style="width:44%"></div></div>
          </div></div>
          <div class="frame" data-i="4"><div class="fic">✨</div><div class="ftitle" id="f4t" style="margin-bottom:12px"></div><div class="chips" id="f4chips"></div></div>
        </div>
      </div>
      <div class="caption">
        <div class="cstep" id="capStep"></div>
        <div class="ctitle" id="capTitle"></div>
        <div class="ctext" id="capText"></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
  </section>

  <section class="stats" id="stats">
    <div class="stat"><div class="n" id="n1">0</div><div class="l" id="l1"></div></div>
    <div class="stat"><div class="n" id="n2">0</div><div class="l" id="l2"></div></div>
    <div class="stat"><div class="n" id="n3">0</div><div class="l" id="l3"></div></div>
  </section>

  <section class="events">
    <h3 id="evTitle"></h3>
    <div class="chips" id="evChips" style="max-width:520px;margin:0 auto;"></div>
  </section>

  <section class="final">
    <h2 id="finTitle"></h2>
    <p id="finSub"></p>
    <a class="btn gold" id="finBtn" href="https://tualiada.es" target="_blank" rel="noopener"></a>
    <a class="credit" href="https://tualiada.es" target="_blank" rel="noopener">— <b>tu aliada</b></a>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
<script>
const I={
 es:{lang:'es',proof:'★ 5.0 · +500 eventos · sin app · listo en minutos',
  h1:'Un detalle que conecta a tus invitados',
  sub:'Escanean un código y juegan sobre el homenajeado. Risas, conversación y un recuerdo que se llevan a casa.',
  cta1:'Ver cómo funciona', cta2:'Hablamos',
  stTitle:'En 5 pasos, sin complicaciones', stSub:'Así lo viven tus invitados',
  steps:[
   {s:'Paso 1 · Escanea',t:'Escanea el código',x:'Apuntas con la cámara del móvil. Sin apps, sin instalar nada. Estás dentro.'},
   {s:'Paso 2 · Juega',t:'Adivina y ríe',x:'Preguntas reales sobre el homenajeado… y alguna respuesta trampa con su gracia. Ahí empiezan las risas.'},
   {s:'Paso 3 · Recuerdo',t:'Un recuerdo para casa',x:'Una foto del momento, para llevársela a casa cuando acabe la noche.'},
   {s:'Paso 4 · En vivo',t:'El anfitrión lo ve en vivo',x:'En pantalla, el ranking y las fotos van apareciendo. La fiesta se mira a sí misma, en directo.'},
   {s:'Paso 5 · A medida',t:'Para cualquier evento',x:'Boda, cumpleaños, graduación o despedida. Tu evento, tus preguntas, tu idioma.'}
  ],
  f0t:'Escanea y entra', f1t:'¿Quién lo conoce mejor?', f2t:'Tu foto del recuerdo', f3t:'Ranking en vivo', f4t:'Tu evento, a tu medida',
  chips:['Boda','Cumpleaños','Graduación','Despedida','Comunión'],
  stats:[['+500','eventos animados'],['10 min','para tenerlo listo'],['0','apps que descargar']],
  evTitle:'Encaja en cualquier celebración',
  finTitle:'Si te encaja, lo preparamos contigo',
  finSub:'Un detalle sencillo que suma a lo que ya haces. Cuando quieras, hablamos.', finBtn:'Hablamos'},
 en:{lang:'en',proof:'★ 5.0 · 500+ events · no app · ready in minutes',
  h1:'A little touch that brings your guests together',
  sub:'They scan a code and play a quiz about the guest of honor. Laughs, conversation and a keepsake to take home.',
  cta1:'See how it works', cta2:"Let's talk",
  stTitle:'Five simple steps', stSub:'Here is what your guests experience',
  steps:[
   {s:'Step 1 · Scan',t:'Scan the code',x:"Point your phone's camera. No apps, nothing to install. You're in."},
   {s:'Step 2 · Play',t:'Guess and laugh',x:"Real questions about the guest of honor… and a few cheeky trick answers. That's where the laughs begin."},
   {s:'Step 3 · Keepsake',t:'A keepsake to take home',x:'A snapshot of the moment, to take home when the night winds down.'},
   {s:'Step 4 · Live',t:'The host sees it live',x:'On screen, the ranking and photos roll in. The party watching itself, in real time.'},
   {s:'Step 5 · Tailored',t:'For any event',x:'Wedding, birthday, graduation or send-off. Your event, your questions, your language.'}
  ],
  f0t:'Scan and join', f1t:'Who knows them best?', f2t:'Your keepsake photo', f3t:'Live ranking', f4t:'Your event, your way',
  chips:['Wedding','Birthday','Graduation','Send-off','Christening'],
  stats:[['500+','events hosted'],['10 min','to get it ready'],['0','apps to download']],
  evTitle:'Fits any celebration',
  finTitle:"If it feels right, we'll set it up with you",
  finSub:'A simple touch that adds to what you already do. Whenever you are ready, let us talk.', finBtn:"Let's talk"},
 sv:{lang:'sv',proof:'★ 5.0 · 500+ event · ingen app · klart på minuter',
  h1:'En liten detalj som för dina gäster samman',
  sub:'De skannar en kod och spelar ett quiz om hyllningsgästen. Skratt, samtal och ett minne att ta med hem.',
  cta1:'Se hur det funkar', cta2:'Hör av dig',
  stTitle:'Fem enkla steg', stSub:'Så här upplever dina gäster det',
  steps:[
   {s:'Steg 1 · Skanna',t:'Skanna koden',x:'Rikta mobilkameran. Inga appar, inget att installera. Du är med.'},
   {s:'Steg 2 · Spela',t:'Gissa och skratta',x:'Riktiga frågor om hyllningsgästen… och några lurigt roliga svar. Där börjar skratten.'},
   {s:'Steg 3 · Minne',t:'Ett minne att ta hem',x:'En bild på stunden, att ta med hem när kvällen lider mot sitt slut.'},
   {s:'Steg 4 · Live',t:'Värden ser det live',x:'På skärmen dyker ranking och bilder upp efter hand. Festen ser sig själv, i realtid.'},
   {s:'Steg 5 · Anpassat',t:'För alla event',x:'Bröllop, födelsedag, examen eller avtackning. Ditt event, dina frågor, ditt språk.'}
  ],
  f0t:'Skanna och gå med', f1t:'Vem känner hen bäst?', f2t:'Din minnesbild', f3t:'Live-ranking', f4t:'Ditt event, på ditt sätt',
  chips:['Bröllop','Födelsedag','Examen','Avtackning','Dop'],
  stats:[['500+','event'],['10 min','att få klart'],['0','appar att ladda ner']],
  evTitle:'Passar varje fest',
  finTitle:'Känns det rätt? Vi sätter upp det tillsammans',
  finSub:'En enkel detalj som adderar till det du redan gör. Hör av dig när du vill.', finBtn:'Hör av dig'}
};
let LANG='es', step=0, timer=null;
const $=id=>document.getElementById(id);
function L(){return I[LANG];}
function fill(){
  const t=L();
  $('proof').textContent=t.proof; $('h1').textContent=t.h1; $('sub').textContent=t.sub;
  $('cta1').textContent=t.cta1; $('cta2').textContent=t.cta2;
  $('stTitle').textContent=t.stTitle; $('stSub').textContent=t.stSub;
  $('f0t').textContent=t.f0t; $('f1t').textContent=t.f1t; $('f2t').textContent=t.f2t; $('f3t').textContent=t.f3t; $('f4t').textContent=t.f4t;
  $('f4chips').innerHTML=t.chips.map(c=>`<span class="chip">${c}</span>`).join('');
  $('evTitle').textContent=t.evTitle;
  $('evChips').innerHTML=t.chips.map(c=>`<span class="chip">${c}</span>`).join('');
  $('l1').textContent=t.stats[0][1]; $('l2').textContent=t.stats[1][1]; $('l3').textContent=t.stats[2][1];
  $('finTitle').textContent=t.finTitle; $('finSub').textContent=t.finSub; $('finBtn').textContent=t.finBtn;
  $('dots').innerHTML=t.steps.map((s,i)=>`<i class="${i===step?'on':''}" onclick="go(${i})"></i>`).join('');
  ['es','sv','en'].forEach(c=>{const b=$('l-'+c);if(b)b.className='lbtn'+(c===LANG?' on':'');});
  renderCap();
}
function renderCap(){
  const s=L().steps[step];
  $('capStep').textContent=s.s; $('capTitle').textContent=s.t; $('capText').textContent=s.x;
  document.querySelectorAll('.frame').forEach(f=>f.classList.toggle('on',+f.dataset.i===step));
  document.querySelectorAll('#dots i').forEach((d,i)=>d.classList.toggle('on',i===step));
  const bar=$('pbar'); bar.style.transition='none'; bar.style.width='0';
  void bar.offsetWidth; bar.style.transition='width 3.6s linear'; bar.style.width='100%';
  if(step===3 && window.confetti){confetti({particleCount:90,spread:65,origin:{y:.5},disableForReducedMotion:true,colors:['#E9C46A','#FF6B9D','#fff']});}
}
function go(i){step=i;renderCap();restart();}
function nextStep(){step=(step+1)%5;renderCap();}
function restart(){clearInterval(timer);timer=setInterval(nextStep,3800);}
function setLang(l){if(!I[l])return;LANG=l;document.documentElement.lang=l;fill();}
function countUp(el,to,suf){let c=0;const step=Math.max(1,Math.round(to/40));const f=()=>{c+=step;if(c>=to){c=to;}el.textContent=c+(suf||'');if(c<to)requestAnimationFrame(f);};f();}
function initLang(){const q=(location.search.match(/[?&]lang=(es|sv|en)/)||[])[1];setLang(q||'es');}

initLang();
restart();
let counted=false;
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting&&!counted){counted=true;
  $('n1').textContent='+500'; $('n2').textContent='10 min'; $('n3').textContent='0';
}}),{threshold:.4});
io.observe($('stats'));
</script>
</body>
</html>
