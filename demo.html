<style>
  :root{--bg:#FFF8F0;--card:#fff;--coral:#FF2E63;--amar:#FFC43D;--turq:#27D17C;--orange:#FF8A3D;
    --green:#27D17C;--navy:#142433;--brick:#9a5a44;--ink:#142433;--soft:#5d6f7d;--line:rgba(20,36,51,.12);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden;line-height:1.5;}
  .blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.5;z-index:0;pointer-events:none;}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 22px;}
  h1,h2,h3,.fr{font-family:'Fraunces',serif;}
  .lang{display:flex;gap:6px;justify-content:flex-end;padding:14px 0 0;}
  .lbtn{background:#fff;border:1px solid var(--line);color:var(--soft);font-family:inherit;font-weight:700;font-size:.78rem;border-radius:999px;padding:6px 12px;cursor:pointer;}
  .lbtn.on{border-color:var(--coral);color:var(--coral);}

  /* ===== HERO above-the-fold ===== */
  .hero{min-height:calc(100dvh - 56px);display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:center;padding-bottom:10px;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);color:var(--ink);font-size:.8rem;font-weight:700;padding:7px 14px;border-radius:999px;margin-bottom:18px;box-shadow:0 6px 18px rgba(26,20,48,.06);}
  .badge .st{color:var(--amar);}
  h1{font-weight:900;font-size:3rem;line-height:1.02;letter-spacing:-.5px;margin-bottom:14px;}
  h1 em{font-style:italic;color:var(--coral);}
  .sub{color:var(--soft);font-size:1.08rem;max-width:26em;margin-bottom:22px;}
  .cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
  .btn{border:none;border-radius:14px;font-family:inherit;font-weight:800;font-size:1rem;padding:14px 24px;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .18s;}
  .btn.main{background:linear-gradient(100deg,#FF5470,#FF8A3D,#FFC43D);color:#fff;box-shadow:0 12px 28px rgba(255,84,112,.34);}
  .btn.main:hover{transform:translateY(-2px);}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .mstats{display:flex;gap:24px;}
  .mstat .n{font-family:'Fraunces';font-weight:900;font-size:1.5rem;color:var(--coral);line-height:1;}
  .mstat .l{color:var(--soft);font-size:.78rem;}

  /* columna derecha: foto rotando + móvil encima */
  .stage{position:relative;display:flex;justify-content:center;align-items:center;min-height:600px;}
  .photocard{position:absolute;width:230px;height:300px;right:6%;top:50%;transform:translateY(-46%) rotate(6deg);border-radius:20px;overflow:hidden;box-shadow:0 26px 60px rgba(26,20,48,.28);border:6px solid #fff;}
  .photocard .pl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s ease;}
  .photocard .pl.show{opacity:1;}
  .glow{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,84,112,.5),transparent 70%);filter:blur(20px);left:42%;top:50%;transform:translate(-50%,-50%);}

  .phone{position:relative;width:282px;height:580px;border-radius:40px;background:#11121c;padding:12px;box-shadow:0 34px 70px rgba(26,20,48,.4);z-index:2;}
  .notch{position:absolute;top:15px;left:50%;transform:translateX(-50%);width:80px;height:7px;background:rgba(255,255,255,.22);border-radius:99px;z-index:6;}
  .pscreen{width:100%;height:100%;border-radius:28px;overflow:hidden;position:relative;background:#fff;}
  .pbar{position:absolute;top:0;left:0;height:4px;background:var(--coral);width:0;z-index:7;}
  .ptab{position:absolute;top:14px;left:0;right:0;text-align:center;font-size:.72rem;font-weight:800;color:var(--soft);z-index:6;}
  .frame{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 20px 58px;text-align:center;opacity:0;transform:scale(.96);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);pointer-events:none;}
  .appbar{position:absolute;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;font-size:.74rem;font-weight:800;color:var(--ink);z-index:6;background:#fff;border-bottom:1px solid var(--line);}
  .appbar .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;vertical-align:middle;}
  .appbar .lv{color:var(--coral);font-size:.64rem;font-weight:800;}
  .appbar .lv i{width:6px;height:6px;border-radius:50%;background:var(--coral);display:inline-block;margin-right:4px;animation:blink 1s infinite;vertical-align:middle;}
  .bnav{position:absolute;bottom:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--line);background:#fff;z-index:6;font-size:1.15rem;}
  .bnav span{opacity:.4;}
  .bnav .act{opacity:1;transform:scale(1.18);}
  .joinrow{display:flex;align-items:center;gap:3px;margin-top:16px;font-size:1.25rem;}
  .joinrow b{font-size:.78rem;color:var(--green);margin-left:7px;font-weight:800;}
  .qmeta{display:flex;justify-content:space-between;width:100%;font-size:.72rem;font-weight:800;color:var(--soft);margin-bottom:6px;}
  .timer{width:100%;height:5px;background:#eee;border-radius:99px;overflow:hidden;margin-bottom:16px;}
  .timer span{display:block;height:100%;width:85%;background:var(--coral);border-radius:99px;}
  .frame.on .timer span{animation:tdown 3.4s linear forwards;}
  @keyframes tdown{from{width:90%}to{width:6%}}
  .keepframe{padding:7px;border-radius:18px;background:linear-gradient(135deg,var(--coral),var(--amar),var(--green));box-shadow:0 16px 34px rgba(20,36,51,.28);}
  .frame.on .keepframe{animation:drop2 .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes drop2{0%{transform:translateY(-44px) scale(.92);opacity:0}100%{transform:none;opacity:1}}
  .kfin{background:#fff;border-radius:12px;padding:8px 8px 0;}
  .kfin img{width:152px;height:138px;object-fit:cover;border-radius:8px;display:block;transition:opacity .3s;}
  .kcap{font-family:'Fraunces';font-weight:900;font-size:.92rem;color:var(--ink);padding:8px 2px 10px;}
  .rkrow span{margin-left:auto;font-size:.76rem;color:var(--soft);font-weight:800;}
  .frame.on{opacity:1;transform:scale(1);}
  .fic{font-size:2.3rem;margin-bottom:8px;}
  .ftitle{font-family:'Fraunces';font-weight:900;color:var(--ink);font-size:1.2rem;margin-bottom:6px;}
  .fsub{color:var(--soft);font-size:.8rem;}
  .qrbox{position:relative;width:128px;height:128px;margin:6px auto 14px;border-radius:16px;border:6px solid var(--ink);overflow:hidden;background:#fff;}
  .qrbox img{position:absolute;inset:6px;width:calc(100% - 12px);height:calc(100% - 12px);display:block;}
  .scanline{position:absolute;left:0;right:0;height:14px;background:linear-gradient(var(--turq),transparent);opacity:.8;animation:scan 1.6s ease-in-out infinite;}
  @keyframes scan{0%,100%{top:4px}50%{top:104px}}
  .opt{width:100%;background:#f4f2f8;border:1.5px solid var(--line);border-radius:13px;padding:12px;margin:5px 0;font-size:.85rem;font-weight:700;text-align:left;color:var(--ink);opacity:0;transform:translateY(10px);}
  .frame.on .opt{animation:rise .34s cubic-bezier(.34,1.56,.64,1) forwards;}
  .frame.on .opt:nth-child(3){animation-delay:.08s;}
  .frame.on .opt:nth-child(4){animation-delay:.16s;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .opt.good{border-color:var(--turq);background:rgba(33,212,180,.16);color:#0c7a64;}
  .opt.dim{opacity:.45;}
  .pola{width:152px;background:#fff;padding:9px 9px 28px;border-radius:7px;box-shadow:0 16px 34px rgba(26,20,48,.3);}
  .frame.on .pola{animation:drop .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes drop{0%{transform:translateY(-46px) rotate(-8deg);opacity:0}100%{transform:translateY(0) rotate(-4deg);opacity:1}}
  .pola{transform:rotate(-4deg);}
  .pola img{width:100%;height:140px;object-fit:cover;border-radius:3px;display:block;}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:8;pointer-events:none;}
  .frame.on .flash{animation:fl .35s ease-out;}
  @keyframes fl{0%{opacity:.85}100%{opacity:0}}
  .rk{width:100%;}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;color:var(--coral);margin-bottom:10px;}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--coral);animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25}}
  .rkrow{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:.85rem;color:var(--ink);font-weight:700;}
  .rkbar{height:15px;border-radius:8px;background:linear-gradient(90deg,var(--coral),var(--amar));width:0;}
  .frame.on .rkbar{animation:grow .9s cubic-bezier(.16,1,.3,1) forwards;}
  .frame.on .rkrow:nth-child(3) .rkbar{animation-delay:.12s;}
  .frame.on .rkrow:nth-child(4) .rkbar{animation-delay:.24s;}
  @keyframes grow{to{width:var(--w);}}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
  .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:.78rem;font-weight:700;color:var(--ink);}
  .chip.on{background:var(--coral);color:#fff;border-color:var(--coral);}
  .caps{position:absolute;left:50%;bottom:-44px;transform:translateX(-50%);white-space:nowrap;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:.85rem;font-weight:700;box-shadow:0 8px 20px rgba(26,20,48,.1);}
  .caps b{color:var(--coral);}
  .dots{display:flex;gap:7px;justify-content:center;position:absolute;left:0;right:0;bottom:-74px;}
  .dots i{width:8px;height:8px;border-radius:99px;background:rgba(26,20,48,.18);display:block;transition:.2s;cursor:pointer;}
  .dots i.on{background:var(--coral);width:22px;}

  /* ===== resto (bajo el fold) ===== */
  .more{text-align:center;padding:70px 0 20px;}
  .more h2{font-size:1.9rem;margin-bottom:8px;}
  .more .s{color:var(--soft);margin-bottom:22px;}
  .evchips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:540px;margin:0 auto 26px;}
  .marquee{overflow:hidden;width:100vw;position:relative;left:50%;margin-left:-50vw;margin-top:12px;-webkit-mask:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);}
  .track{display:flex;gap:14px;width:max-content;padding:6px 0;}
  .cell{width:228px;height:150px;border-radius:16px;overflow:hidden;flex:0 0 auto;box-shadow:0 12px 26px rgba(20,36,51,.16);}
  .cell img{width:100%;height:100%;object-fit:cover;display:block;animation:kb 8s ease-in-out infinite alternate;}
  .cell:nth-child(2n) img{animation-delay:-4s;}
  .cell:nth-child(3n) img{animation-duration:10s;}
  .cell:nth-child(4n) img{animation-duration:9s;animation-delay:-2.5s;}
  .t1{animation:mq 44s linear infinite;}
  .t2{animation:mq 52s linear infinite reverse;animation-delay:-10s;}
  .marquee:hover .track{animation-play-state:paused;}
  @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes kb{from{transform:scale(1)}to{transform:scale(1.13)}}
  .final{text-align:center;padding:30px 0 64px;}
  .final h2{font-size:2rem;margin-bottom:8px;max-width:16em;margin-left:auto;margin-right:auto;}
  .final p{color:var(--soft);margin-bottom:22px;}
  .credit{display:block;color:var(--soft);font-size:.82rem;margin-top:24px;text-decoration:none;}
  .credit b{color:var(--coral);}

  @media(max-width:780px){
    .hero{grid-template-columns:1fr;gap:14px;min-height:auto;padding-top:6px;}
    h1{font-size:2rem;}
    .sub{display:none;}
    .stage{min-height:auto;order:2;margin:6px 0 60px;}
    .photocard{display:none;}
    .phone{width:236px;height:486px;}
    .glow{width:260px;height:260px;}
    .mstats{order:4;}
    .cta{order:3;width:100%;}
    .btn.main{flex:1;text-align:center;}
    .gallery{grid-template-columns:repeat(2,1fr);}
    .frame{padding:30px 18px;}
  }
</style>
</head>

   {s:'Keepsake',t:'A keepsake to take home',x:'A snapshot of the moment, to keep.'},
   {s:'Live',t:'The host sees it live',x:'The ranking and photos roll in. The party watching itself.'},
   {s:'Tailored',t:'For any event',x:'Wedding, birthday, graduation or send-off. Your event, your language.'}
  ],
  f0t:'Scan and join', f0s:'no apps', f1t:'Who knows them best?', f2t:'Your keepsake photo', f3live:'LIVE', f3t:'Live ranking', f4t:'Your event, your way', join:'12 in', qmeta:'Question 3 / 16', kcap:'🎉 Congrats!',

  finTitle:"If it feels right, we'll set it up with you",

 sv:{lang:'sv',proof:'500+ event · ingen app',
  h1:'Mer skratt och gemenskap på din nästa <em>fest</em>',

  steps:[
   {s:'Skanna',t:'Skanna koden',x:'Rikta kameran. Inga appar, inget att installera.'},

const POP=['#FF5470','#FFC43D','#21D4B4','#FF8A3D'];
const $=id=>document.getElementById(id);
let LANG='es', step=0, timer=null, fi=0, fotoLayer=true, photoTimer=null;
function L(){return I[LANG];}
function tipoOf(f){return LANG==='en'?f.tipoEn:(LANG==='sv'?f.tipoSv:f.tipo);}

function fill(){
  const t=L();
  $('bproof').textContent=t.proof; $('h1').innerHTML=t.h1; $('sub').textContent=t.sub;
  $('cta1').textContent=t.cta1; $('cta2').textContent=t.cta2;
  $('ms1').textContent=t.ms[0]; $('ms2').textContent=t.ms[1]; $('ms3').textContent=t.ms[2];
  $('f0t').textContent=t.f0t; $('f0s').textContent=t.f0s; $('f1t').textContent=t.f1t; $('f2t').textContent=t.f2t;
  $('f3live').textContent=t.f3live; $('f3t').textContent=t.f3t; $('f4t').textContent=t.f4t;
  $('joinlbl').textContent=t.join; $('qmeta1').textContent=t.qmeta; $('kcap').textContent=t.kcap;
  $('evTitle').textContent=t.evTitle; $('evSub').textContent=t.evSub;
  $('finTitle').textContent=t.finTitle; $('finSub').textContent=t.finSub; $('finBtn').textContent=t.finBtn; $('finMail').textContent=t.finMail;
  $('evChips').innerHTML=FOTOS.map(f=>`<span class="chip">${tipoOf(f)}</span>`).join('');
  $('dots').innerHTML=t.steps.map((s,i)=>`<i class="${i===step?'on':''}" onclick="go(${i})"></i>`).join('');
  ['es','sv','en'].forEach(c=>{const b=$('l-'+c);if(b)b.className='lbtn'+(c===LANG?' on':'');});
  renderChips(); renderCap();
}
function renderChips(){
  $('f4chips').innerHTML=FOTOS.map((f,i)=>`<span class="chip${i===fi?' on':''}">${tipoOf(f)}</span>`).join('');
}
function renderCap(){
  const s=L().steps[step];
  $('caps').innerHTML=`<b>${s.s}</b> · ${s.t}`;
  document.querySelectorAll('.frame').forEach(f=>f.classList.toggle('on',+f.dataset.i===step));
  document.querySelectorAll('#dots i').forEach((d,i)=>d.classList.toggle('on',i===step));
  const bar=$('pbar'); bar.style.transition='none'; bar.style.width='0';
  void bar.offsetWidth; bar.style.transition='width 3.4s linear'; bar.style.width='100%';
  if(step===1) setTimeout(confettiAcierto,500);
  if(step===3){ setTimeout(confettiGanador,420); countUp($('pt1'),1240); }
}
function go(i){step=i;renderCap();restart();}
function nextStep(){step=(step+1)%5;renderCap();}
function restart(){clearInterval(timer);timer=setInterval(nextStep,3400);}
function setLang(l){if(!I[l])return;LANG=l;document.documentElement.lang=l;fill();}
function countUp(el,to){let c=0;const s=Math.max(1,Math.round(to/45));const f=()=>{c+=s;if(c>=to)c=to;el.textContent=c.toLocaleString('es-ES');if(c<to)requestAnimationFrame(f);};f();}

function confettiAcierto(){if(!window.confetti)return;confetti({particleCount:24,spread:55,startVelocity:26,scalar:.8,origin:{y:.55},colors:['#21D4B4','#FFC43D'],disableForReducedMotion:true});}
function confettiGanador(){if(!window.confetti)return;const end=Date.now()+700;(function f(){confetti({particleCount:5,angle:60,spread:60,origin:{x:0,y:.7},colors:POP,disableForReducedMotion:true});confetti({particleCount:5,angle:120,spread:60,origin:{x:1,y:.7},colors:POP,disableForReducedMotion:true});if(Date.now()<end)requestAnimationFrame(f);})();confetti({particleCount:110,spread:90,startVelocity:42,scalar:1.05,origin:{y:.6},colors:POP,disableForReducedMotion:true});}
function confettiBienvenida(){if(!window.confetti)return;const end=Date.now()+1400;(function f(){confetti({particleCount:2,startVelocity:0,ticks:200,gravity:.4,origin:{x:Math.random(),y:-0.1},colors:POP,scalar:.7,disableForReducedMotion:true});if(Date.now()<end)requestAnimationFrame(f);})();}

function rotarFoto(){
  fi=(fi+1)%FOTOS.length;
  const src=FOTOS[fi].src, img=new Image();
  img.onload=()=>{
    const a=document.querySelector('.photocard .a'), b=document.querySelector('.photocard .b');
    const showEl=fotoLayer?b:a, hideEl=fotoLayer?a:b;
    showEl.src=src; showEl.classList.add('show'); hideEl.classList.remove('show'); fotoLayer=!fotoLayer;
    const pola=$('polaimg'); pola.style.opacity=0; setTimeout(()=>{pola.src=src;pola.style.opacity=1;},250);
    renderChips();
  };
  img.src=src;
}

function initLang(){const q=(location.search.match(/[?&]lang=(es|sv|en)/)||[])[1];setLang(q||'es');}

document.querySelector('.photocard .a').src=FOTOS[0].src;
document.querySelector('.photocard .a').classList.add('show');
$('polaimg').src=FOTOS[0].src; $('polaimg').style.transition='opacity .3s';
function shuffleArr(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const row1=shuffleArr(GAL), row2=shuffleArr(GAL);
const imgs=arr=>arr.concat(arr).map(s=>`<div class="cell"><img loading="lazy" alt="" src="${s}"></div>`).join('');
$('track1').innerHTML=imgs(row1); $('track2').innerHTML=imgs(row2);
initLang();
restart();
photoTimer=setInterval(rotarFoto,4200);
setTimeout(confettiBienvenida,400);
</script>
